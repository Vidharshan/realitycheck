name: Android Cloud Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/**'
  workflow_dispatch: # Allows you to manually trigger it via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      working-directory: ./mobile_app
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RealityCheck-Android-App
        path: mobile_app/app/build/outputs/apk/debug/app-debug.apk
